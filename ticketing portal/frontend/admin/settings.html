<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — SupportHub Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div class="admin-shell">
  <aside class="admin-sidebar" id="adminSidebar">
    <a href="dashboard.html" class="brand">
      <span class="brand-icon"><i class="fa-solid fa-shield-halved"></i></span>
      SupportHub
    </a>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="tickets.html" class="sidebar-link"><i class="fa-solid fa-ticket"></i> Tickets</a>
      <a href="customers.html" class="sidebar-link"><i class="fa-solid fa-users"></i> Customers</a>
      <a href="analytics.html" class="sidebar-link"><i class="fa-solid fa-chart-line"></i> Analytics</a>
      <a href="reports.html" class="sidebar-link"><i class="fa-solid fa-file-lines"></i> Reports</a>
      <a href="settings.html" class="sidebar-link"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sidebarAvatar">AU</div>
        <div class="user-info">
          <div class="user-name" id="sidebarUserName">Admin User</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="sidebar-link logout-link" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex; align-items:center; gap:var(--space-4);">
        <button class="sidebar-toggle-btn" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
      </div>
      <div class="topbar-actions">
        <div class="theme-toggle" id="themeToggle"><div class="toggle-knob">🌙</div></div>
      </div>
    </header>

    <main class="admin-content" style="max-width:600px;">
      <div class="content-header">
        <div>
          <h1>Settings</h1>
          <p>Manage your admin account preferences.</p>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: var(--space-4);">Account Details</h3>
        <div class="form-group">
          <input type="text" id="settingsName" class="form-input" placeholder=" ">
          <label>Full Name</label>
        </div>
        <div class="form-group">
          <input type="email" id="settingsEmail" class="form-input" placeholder=" " disabled>
          <label>Email Address</label>
        </div>
        <button class="btn btn-primary" id="saveSettingsBtn">Save Changes</button>
      </div>

      <div class="card" style="margin-top: var(--space-5);">
        <h3 style="margin-bottom: var(--space-3);">Session</h3>
        <p class="text-secondary" style="font-size:var(--fs-sm); margin-bottom:var(--space-4);">
          Logged in since <span id="loginTimeDisplay">—</span>
        </p>
        <button class="btn btn-danger" id="settingsLogoutBtn">Logout</button>
      </div>
    </main>
  </div>
</div>

<script src="../assets/js/theme-toggle.js"></script>
<script src="../assets/js/admin-guard.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script src="../assets/js/settings-admin.js"></script>
</body>
</html>
